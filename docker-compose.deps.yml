services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cinematch
      POSTGRES_PASSWORD: cinematch
      POSTGRES_DB: cinematch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
